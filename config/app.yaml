# === Models ===
models:
  summarizer:                # llama.cpp GGUF used only for gists
    name: "llama-3-1b-instruct-q4_0.gguf"
    url:  "https://example.com/gguf/llama-3-1b-instruct-q4_0.gguf"   # put real URL you trust
    sha256: ""               # optional: set if you want checksum verification
    n_ctx: 2048
    n_threads: 6
    n_gpu_layers: 0
    temperature: 0.0
    top_p: 0.9
  rewriter_base:             # Gemma for prompt-tuning (PEFT)
    hf_id: "google/gemma-2b-it"
    device: "auto"           # cuda | mps | cpu | auto

# === Paths ===
paths:
  models_cache: "models"                   # downloaded GGUF goes here
  raw: "data/raw"                          # structure: raw/<style_id>/*.{pdf,docx,txt,md} OR raw/* files -> style "default"
  interim: "data/interim"
  datasets: "data/datasets"                # per-style jsonl: datasets/<style_id>.jsonl
  softprompt_root: "artifacts/softprompt"  # per-style dir: artifacts/softprompt/<style_id>/
  reports: "artifacts/reports"
  registry: "artifacts/registry.json"      # models+styles registry

# === Ingest ===
ingest:
  target_chunks: 120
  words_per_chunk: 120
  accept: [".docx", ".pdf", ".txt", ".md"]