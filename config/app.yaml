model_id: "google/gemma-2b-it"   # for soft-prompt training
device: "auto"

summarizer:
  model_id: "meta-llama/Llama-3.2-1B-Instruct"
  cache_dir: ".hf_cache"         # will be created; local-only
  max_new_tokens: 96
  temperature: 0.0

virtual_tokens: 40
epochs: 3
batch_size: 8
lr: 0.005
max_seq_len: 512

ingest:
  target_chunks: 120
  words_per_chunk: 120
  accept: [".docx", ".pdf", ".txt", ".md"]

paths:
  raw: "data/raw"                # supports per-style subfolders: data/raw/<style_id>/*
  interim: "data/interim"
  datasets: "data/datasets"      # will create per-style jsonl
  softprompt: "artifacts/softprompt"
  reports: "artifacts/reports"
  runs: "artifacts/runs"
  registry: "artifacts/registry" # styles.json
