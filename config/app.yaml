model_id: "google/gemma-2b-it"
device: "auto"            # "cuda" | "mps" | "cpu" | "auto"

virtual_tokens: 40
epochs: 3
batch_size: 8
lr: 0.005
max_seq_len: 512

ingest:
  target_chunks: 120
  words_per_chunk: 120
  accept: [".docx", ".pdf", ".txt", ".md"]

paths:
  raw: "data/raw"
  interim: "data/interim"
  datasets: "data/datasets"
  softprompt: "artifacts/softprompt"     # will store as artifacts/softprompt/<style_id>/*
  reports: "artifacts/reports"
  runs: "artifacts/runs"
